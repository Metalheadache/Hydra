name: Publish to PyPI

# Triggered by version tags (e.g. v1.0.2 created by `bump-my-version bump patch`)
on:
  push:
    tags:
      - 'v*'

# PyPI trusted publishing (OIDC) — no API token needed in secrets.
# One-time setup: go to https://pypi.org/manage/project/hydra-agents/settings/publishing/
# and add a "pending publisher":
#   Owner:      Metalheadache
#   Repository: Hydra
#   Workflow:   publish.yml
#   Environment: pypi
permissions:
  contents: read
  id-token: write   # required for OIDC token exchange with PyPI

jobs:
  publish:
    name: Build wheel and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hydra-agents/

    steps:
      - uses: actions/checkout@v4

      # ── Build frontend ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        run: |
          cd frontend
          npm ci
          npm run build
          # Populate the bundled dist dir that gets included in the wheel.
          # The directory is gitignored; we create it fresh each CI run.
          mkdir -p ../hydra_agents/frontend_dist
          cp -r dist/. ../hydra_agents/frontend_dist/

      # ── Verify tag matches pyproject.toml version ─────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v1.0.2
          PKG_VERSION="v$(python3 -c \
            'import tomllib; d=tomllib.load(open("pyproject.toml","rb")); print(d["project"]["version"])')"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG"

      # ── Build distribution ────────────────────────────────────────────────
      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      # ── Publish ───────────────────────────────────────────────────────────
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
