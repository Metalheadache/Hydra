name: Publish to PyPI

# Triggered by version tags (e.g. v1.0.2 created by `bump-my-version bump patch`)
on:
  push:
    tags:
      - 'v*'

# Minimal workflow-level permissions; id-token: write is scoped to the publish
# job only so the OIDC token isn't available to the test job.
permissions:
  contents: read

# PyPI trusted publishing (OIDC) — no API token stored in secrets.
# One-time setup: https://pypi.org/manage/project/hydra-agents/settings/publishing/
#   Owner:       Metalheadache
#   Repository:  Hydra
#   Workflow:    publish.yml
#   Environment: pypi

jobs:
  # ── Test gate ──────────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/

  # ── Build and publish ──────────────────────────────────────────────────────
  publish:
    name: Build wheel and publish
    needs: [test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hydra-agents/
    # id-token scoped to this job only — not exposed to the test job
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # ── Build frontend ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        run: |
          cd frontend
          npm ci
          npm run build
          # Populate the bundled dist dir included in the wheel.
          # The directory is gitignored; we create it fresh each CI run.
          mkdir -p ../hydra_agents/frontend_dist
          cp -r dist/. ../hydra_agents/frontend_dist/

      # ── Validate version ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Validate PEP 440 version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # strip leading v  →  1.0.2
          python3 - <<EOF
          from packaging.version import Version, InvalidVersion
          import sys
          v = "${VERSION}"
          try:
              Version(v)
              print(f"PEP 440 check passed: {v}")
          except InvalidVersion:
              print(f"::error::'{v}' is not a valid PEP 440 version")
              sys.exit(1)
          EOF

      - name: Check tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.0.2
          PKG_VERSION="v$(python3 -c \
            'import tomllib; d=tomllib.load(open("pyproject.toml","rb")); print(d["project"]["version"])')"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG"

      # ── Build distribution ───────────────────────────────────────────────
      - name: Build wheel and sdist
        run: |
          pip install "build>=1.2"
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/

      # ── Publish ──────────────────────────────────────────────────────────
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
